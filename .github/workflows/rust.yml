name: Cargo Builder for Pi 5 ARM No-Release

on:
  push:
    tags:
      - 'v*' 

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install Cross
        run: curl -L https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-musl.tar.gz | tar xz -C /usr/local/bin

      - name: Install JACK dependencies
        run: sudo apt-get install -y libjack-jackd2-dev pkg-config

      - name: Build Binary
        run: cross build --release --target aarch64-unknown-linux-gnu

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/aarch64-unknown-linux-gnu/release/pickup-processor
          generate_release_notes: true
          fail_on_unmatched_files: true
