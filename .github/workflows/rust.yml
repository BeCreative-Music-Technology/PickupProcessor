name: Release ARM Binary

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*' # Triggers when you push a tag like v1.0.2
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    # We need "write" permissions to create the Release and upload files
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install Cross
        run: |
          curl -L https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-musl.tar.gz | tar xz -C /usr/local/bin

      - name: Build Binary
        run: cross build --release --target aarch64-unknown-linux-gnu

      # This step only runs if you pushed a TAG
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/aarch64-unknown-linux-gnu/release/pickupprocessor
          generate_release_notes: true
          draft: false
          prerelease: false
