name: Release ARM Binary

on:
  push:
    tags:
      - 'v*' 

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    # This block tells GitHub exactly what this script is allowed to do
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install Cross
        run: |
          curl -L https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-musl.tar.gz | tar xz -C /usr/local/bin

      - name: Build Binary
        run: cross build --release --target aarch64-unknown-linux-gnu

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Use a wildcard for the file to avoid naming mismatches
          files: target/aarch64-unknown-linux-gnu/release/*
          # This avoids uploading the junk .d and .fingerprint files
          fail_on_unmatched_files: false 
          generate_release_notes: true
